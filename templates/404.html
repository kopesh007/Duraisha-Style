
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Kopesh Store</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0f1c, #121a2f);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 120px;
            margin: 0;
            color: #3aa6ff;
            letter-spacing: 5px;
        }

        h2 {
            margin: 10px 0;
            font-size: 28px;
            font-weight: 500;
        }

        p {
            color: #a0b3d6;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .btn {
            text-decoration: none;
            padding: 12px 30px;
            background: #3aa6ff;
            color: #000;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn:hover {
            background: #1f8ae0;
            transform: scale(1.05);
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #3aa6ff;
        }

        .glow {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #3aa6ff;
            }
            to {
                text-shadow: 0 0 25px #3aa6ff;
            }
        }
    </style>
</head>
<body>

    <div class="logo">KOPESH STORE</div>

    <div class="container">
        <h1 class="glow">404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you're looking for doesn’t exist or has been moved.<br>
           Let’s get you back to something stylish 😉</p>

        <a href="/" class="btn">Go Back Home</a>
    </div>

</body>
</html>
